<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#131313",
                        "surface": "#131313",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed-dim": "#d6c4a5",
                        "secondary": "#d6c4a5",
                        "primary": "#e9c176",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed-dim": "#e9c176",
                        "surface-dim": "#131313",
                        "primary-container": "#c5a059",
                        "error-container": "#93000a",
                        "on-secondary-container": "#c4b395",
                        "on-error": "#690005",
                        "secondary-fixed": "#f3e0c0",
                        "outline": "#9a8f80",
                        "surface-container-low": "#1c1b1b",
                        "secondary-container": "#51452d",
                        "on-primary-container": "#4e3700",
                        "on-primary": "#412d00",
                        "surface-bright": "#3a3939",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#353534",
                        "on-secondary": "#392f19",
                        "tertiary-container": "#c19e92",
                        "on-tertiary-fixed": "#2b160f",
                        "surface-tint": "#e9c176",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed": "#ffdea5",
                        "on-secondary-fixed": "#231a06",
                        "on-primary-fixed-variant": "#5d4201",
                        "surface-container": "#201f1f",
                        "tertiary": "#e4beb2",
                        "outline-variant": "#4e4639",
                        "tertiary-fixed": "#ffdbce",
                        "surface-container-highest": "#353534",
                        "on-tertiary-fixed-variant": "#5b4137",
                        "on-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                        "on-primary-fixed": "#261900",
                        "tertiary-fixed-dim": "#e4beb2",
                        "on-tertiary": "#422b22",
                        "error": "#ffb4ab",
                        "on-background": "#e5e2e1",
                        "on-tertiary-container": "#4e352c",
                        "on-surface-variant": "#d1c5b4",
                        "inverse-primary": "#775a19",
                        "on-secondary-fixed-variant": "#51452d"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Newsreader', serif; }
    </style>
</head>
<body class="bg-background text-on-surface selection:bg-primary/30">
<main>
<!-- Booking Section -->
<section class="bg-surface py-24 px-6 md:px-0">
<div class="max-w-[600px] mx-auto text-center">
<span class="text-primary font-label text-sm uppercase tracking-[0.2em] mb-4 block">Book a Visit</span>
<h2 class="text-4xl md:text-5xl font-headline font-light text-on-surface mb-4">
                    Schedule Your <span class="italic text-on-surface">Consultation</span>
</h2>
<p class="text-on-surface-variant font-body mb-12">We'll confirm your appointment within 24 hours.</p>
<form class="space-y-6 text-left">
<div class="space-y-2">
<label class="block text-xs uppercase tracking-widest text-on-surface-variant ml-4" for="name">Full Name</label>
<input class="w-full bg-surface-container-low border-outline-variant/30 text-on-surface rounded-xl px-6 py-4 focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 outline-none" id="name" name="name" placeholder="Alexandros Vance" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-xs uppercase tracking-widest text-on-surface-variant ml-4" for="phone">Phone Number</label>
<input class="w-full bg-surface-container-low border-outline-variant/30 text-on-surface rounded-xl px-6 py-4 focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 outline-none" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div class="space-y-2">
<label class="block text-xs uppercase tracking-widest text-on-surface-variant ml-4" for="date">Preferred Date</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-outline-variant/30 text-on-surface rounded-xl px-6 py-4 focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 outline-none appearance-none" id="date" name="date" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">calendar_today</span>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-primary text-on-primary py-5 rounded-full font-bold uppercase tracking-[0.15em] text-sm hover:shadow-[0_0_40px_rgba(233,193,118,0.2)] active:scale-[0.98] transition-all duration-500" type="submit">
                            Book Appointment
                        </button>
</div>
</form>
<div class="flex justify-center items-center">
<img alt="Dermaglow Logo" class="max-w-[420px] md:max-w-[480px] h-auto mix-blend-screen" src="https://lh3.googleusercontent.com/aida/ADBb0uhhFKhM07vgnQPL99La-U0AVwEo3jb5hX_HsCWqYA-At_ScMVUq8N1mZdkXEca8kCs5BSaaOicVmJh7JchDrNm27xSayYxPaAfB_aqRSAaOlbY5_dTaqoBBrfuzmrjh_HaC8kLaOBrd4wkfbyKGHsQOjo_Ud7JBAbpyvIah3ijIpPimOZ61ZxNx-eR4VuZ4dTWVZgS6OPfi6bE9wBjOc-PtMZF0QVfAMJobS2Jqe_AaOzaJxA208efaeLXLN76efYlUOCbG9YZy"/>
</div>
</div>
</section>
</main>
</body></html>
