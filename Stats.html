<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#c4b395",
                        "on-primary-fixed": "#261900",
                        "surface-variant": "#353534",
                        "surface-bright": "#3a3939",
                        "surface-container-highest": "#353534",
                        "on-secondary-fixed": "#231a06",
                        "surface-container-low": "#1c1b1b",
                        "on-primary-fixed-variant": "#5d4201",
                        "inverse-surface": "#e5e2e1",
                        "primary-container": "#c5a059",
                        "on-secondary-fixed-variant": "#51452d",
                        "tertiary-container": "#c19e92",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#392f19",
                        "outline": "#9a8f80",
                        "on-tertiary-fixed-variant": "#5b4137",
                        "on-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "surface": "#131313",
                        "error-container": "#93000a",
                        "inverse-primary": "#775a19",
                        "secondary-fixed": "#f3e0c0",
                        "on-tertiary-fixed": "#2b160f",
                        "on-tertiary": "#422b22",
                        "on-surface-variant": "#d1c5b4",
                        "on-background": "#e5e2e1",
                        "secondary": "#d6c4a5",
                        "error": "#ffb4ab",
                        "primary-fixed": "#ffdea5",
                        "secondary-container": "#51452d",
                        "primary-fixed-dim": "#e9c176",
                        "on-error": "#690005",
                        "primary": "#e9c176",
                        "tertiary-fixed": "#ffdbce",
                        "surface-container-lowest": "#0e0e0e",
                        "outline-variant": "#4e4639",
                        "background": "#131313",
                        "tertiary-fixed-dim": "#e4beb2",
                        "on-tertiary-container": "#4e352c",
                        "on-primary": "#412d00",
                        "tertiary": "#e4beb2",
                        "secondary-fixed-dim": "#d6c4a5",
                        "inverse-on-surface": "#313030",
                        "surface-container": "#201f1f",
                        "on-primary-container": "#4e3700",
                        "surface-tint": "#e9c176",
                        "surface-container-high": "#2a2a2a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-mix italic {
            font-family: 'Newsreader';
            font-style: italic;
            font-weight: 300;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30">
<main>
<!-- Stats Bar Section -->
<section class="bg-[#131313] py-16 w-full">
<div class="max-w-[1400px] mx-auto px-6">
<div class="grid grid-cols-2 md:grid-cols-4 gap-8 md:gap-0">
<div class="flex flex-col items-center justify-center text-center">
<span class="font-headline text-5xl md:text-6xl font-bold text-[#E9C176] mb-2">4.9</span>
<span class="font-body text-[10px] md:text-xs tracking-[0.2em] uppercase text-outline">Ratings</span>
</div>
<div class="flex flex-col items-center justify-center text-center">
<span class="font-headline text-5xl md:text-6xl font-bold text-[#E9C176] mb-2">500+</span>
<span class="font-body text-[10px] md:text-xs tracking-[0.2em] uppercase text-outline">Happy Patients</span>
</div>
<div class="flex flex-col items-center justify-center text-center">
<span class="font-headline text-5xl md:text-6xl font-bold text-[#E9C176] mb-2">12+</span>
<span class="font-body text-[10px] md:text-xs tracking-[0.2em] uppercase text-outline">Treatments</span>
</div>
<div class="flex flex-col items-center justify-center text-center">
<span class="font-headline text-5xl md:text-6xl font-bold text-[#E9C176] mb-2">8+</span>
<span class="font-body text-[10px] md:text-xs tracking-[0.2em] uppercase text-outline">Years Experience</span>
</div>
</div>
</div>
</section>
</main>
</body></html>
